[weapondata]
display_name = "Weapon Data"
id = "weapondata"
type = "fps"
input_device = "any"
flow_target = "data"
description = "Dynamic weapon data arrays for per-weapon systems.\nProvides weapon selection, recoil value storage, and GetActiveWeapon() helper."
state_display = "WPN"
menu_priority = 1
trigger = "// Weapon data initialization\nif (!WeaponData_Initialized) {\n    InitializeWeaponData();\n    WeaponData_Initialized = TRUE;\n}"
functions_code = "function GetActiveWeapon() {\n    return CurrentWeapon;\n}\n\nfunction InitializeWeaponData() {\n    for (weapon_init_idx = 0; weapon_init_idx < WEAPON_COUNT; weapon_init_idx++) {\n        Weapons_RecoilValues[weapon_init_idx * 2] = 0;\n        Weapons_RecoilValues[weapon_init_idx * 2 + 1] = 0;\n    }\n}"
combo = ""

[weapondata.extra_vars]
CurrentWeapon = "int [profile]"
WeaponData_Initialized = "int"
weapon_init_idx = "int"
Weapons_RecoilValues = "int [WEAPON_COUNT * 2]"
