[keyboard]
display_name = "Keyboard"
id = "keyboard"
type = "fps"
description = "Keyboard-to-controller mapping for KBM setups.\nMaps keyboard keys to controller buttons via GetKeyboardKey() helper."
requires_keyboard_file = true
trigger = "// Keyboard-to-controller mapping\nif (KeyboardStatus) {\n    ApplyKeyboard();\n}"
combo = "function ApplyKeyboard() {\n    // No mappings configured\n}"

[[keyboard.options]]
name = "Status"
var = "KeyboardStatus"
type = "toggle"
default = 0
