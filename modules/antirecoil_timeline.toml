[antirecoil_timeline]
display_name = "Anti Recoil (Timeline)"
id = "antirecoil_timeline"
type = "fps"
input_device = "controller"
description = "Per-weapon anti-recoil with 10-phase recoil curves.\nUses const WeaponRecoilTable[][] from recoiltable.gpc for time-based corrections.\nPer-weapon V/H modifiers editable via OLED submenu."
state_display = "AR"
status_var = "AntiRecoilStatus"
needs_weapondata = true
needs_recoiltable = true
conflicts = [
    "antirecoil",
    "antirecoil_decay",
]
trigger = "// Anti-recoil (phase-based) with per-weapon recoil curves\nif (AntiRecoilStatus && get_val(PS5_L2) && get_val(PS5_R2)) {\n    AntiRecoil_Timer++;\n    if (AntiRecoil_Timer == 1) {\n        active_weapon = GetActiveWeapon();\n        if (active_weapon != _last_recoil_weapon) {\n            LoadRecoilPhases(active_weapon);\n        }\n    }\n    if (AntiRecoil_Timer >= ANTIRECOIL_INIT_DELAY) {\n        _current_phase = AntiRecoil_Timer / RECOIL_PHASE_STEP;\n        if (_current_phase >= RECOIL_PHASES) _current_phase = RECOIL_PHASES - 1;\n        Recoil_Vertical = _recoil_phase_v[_current_phase];\n        Recoil_Horizontal = _recoil_phase_h[_current_phase];\n        if (Recoil_Vertical == 0 && _current_phase > 0) { _ar_i = _current_phase; while (_ar_i > 0) { _ar_i--; if (_recoil_phase_v[_ar_i] != 0) { Recoil_Vertical = _recoil_phase_v[_ar_i]; _ar_i = 0; } } }\n        if (Recoil_Horizontal == 0 && _current_phase > 0) { _ar_i = _current_phase; while (_ar_i > 0) { _ar_i--; if (_recoil_phase_h[_ar_i] != 0) { Recoil_Horizontal = _recoil_phase_h[_ar_i]; _ar_i = 0; } } }\n        Recoil_Vertical = Recoil_Vertical + Weapons_RecoilValues[active_weapon * 2];\n        Recoil_Horizontal = Recoil_Horizontal + Weapons_RecoilValues[active_weapon * 2 + 1];\n        set_val(PS5_RY, clamp(get_val(PS5_RY) + Recoil_Vertical, -100, 100));\n        set_val(PS5_RX, clamp(get_val(PS5_RX) + Recoil_Horizontal, -100, 100));\n    }\n} else {\n    AntiRecoil_Timer = 0;\n}"
combo = "define RECOIL_PHASES = 10;\ndefine RECOIL_PHASE_STEP = 18;\ndefine ANTIRECOIL_INIT_DELAY = 1;\n\nfunction LoadRecoilPhases(weapon_id) {\n    for (_current_phase = 0; _current_phase < RECOIL_PHASES; _current_phase++) {\n        _recoil_phase_v[_current_phase] = WeaponRecoilTable[weapon_id][_current_phase * 2];\n        _recoil_phase_h[_current_phase] = WeaponRecoilTable[weapon_id][_current_phase * 2 + 1];\n    }\n    for (_current_phase = 1; _current_phase < RECOIL_PHASES; _current_phase++) {\n        if (_recoil_phase_v[_current_phase] == 0 && _recoil_phase_v[_current_phase - 1] != 0) {\n            _recoil_phase_v[_current_phase] = _recoil_phase_v[_current_phase - 1];\n        }\n        if (_recoil_phase_h[_current_phase] == 0 && _recoil_phase_h[_current_phase - 1] != 0) {\n            _recoil_phase_h[_current_phase] = _recoil_phase_h[_current_phase - 1];\n        }\n    }\n    _last_recoil_weapon = weapon_id;\n}\n\nfunction AntiRecoilTimeline_RenderSubmenu() {\n    Clear();\n\n    if (AntiRecoilTimeline_SubPage == 0) {\n        draw_scroll_dynamic(AntiRecoilTimeline_SubPage, 1);\n        XSelect(rect_y);\n\n        print(32, 11, OLED_FONT_SMALL, OLED_WHITE, Weapons[AR_EditWeapon]);\n        if (rect_y == 12) {\n            if (event_press(RIGHT_BTN)) {\n                AR_EditWeapon++;\n                if (AR_EditWeapon > WEAPON_MAX_INDEX) { AR_EditWeapon = 0; }\n                DrewStates = FALSE;\n            }\n            if (event_press(LEFT_BTN)) {\n                AR_EditWeapon--;\n                if (AR_EditWeapon < 0) { AR_EditWeapon = WEAPON_MAX_INDEX; }\n                DrewStates = FALSE;\n            }\n        }\n\n        print(32, 27, OLED_FONT_SMALL, OLED_WHITE, AntiRecoilTimeline_OptionText[0]);\n        drawing_toggle(110, 27, AntiRecoilStatus);\n        if (rect_y == 28) {\n            if (event_press(RIGHT_BTN) || event_press(LEFT_BTN)) {\n                AntiRecoilStatus = !AntiRecoilStatus;\n            }\n        }\n\n        print(32, 43, OLED_FONT_SMALL, OLED_WHITE, AntiRecoilTimeline_OptionText[1]);\n        PrintNumber(Weapons_RecoilValues[AR_EditWeapon * 2], find_digits(abs(Weapons_RecoilValues[AR_EditWeapon * 2])) + 1, 98, 43, OLED_FONT_SMALL);\n        if (rect_y == 44) {\n            if (get_val(ADS_BTN) && event_press(RIGHT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2] += 10; }\n            else if (event_press(RIGHT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2]++; }\n            if (get_val(ADS_BTN) && event_press(LEFT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2] -= 10; }\n            else if (event_press(LEFT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2]--; }\n        }\n    } else {\n        draw_scroll_dynamic(AntiRecoilTimeline_SubPage, 1);\n        XSelect(rect_y);\n\n        print(32, 11, OLED_FONT_SMALL, OLED_WHITE, AntiRecoilTimeline_OptionText[2]);\n        PrintNumber(Weapons_RecoilValues[AR_EditWeapon * 2 + 1], find_digits(abs(Weapons_RecoilValues[AR_EditWeapon * 2 + 1])) + 1, 98, 11, OLED_FONT_SMALL);\n        if (rect_y == 12) {\n            if (get_val(ADS_BTN) && event_press(RIGHT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2 + 1] += 10; }\n            else if (event_press(RIGHT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2 + 1]++; }\n            if (get_val(ADS_BTN) && event_press(LEFT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2 + 1] -= 10; }\n            else if (event_press(LEFT_BTN)) { Weapons_RecoilValues[AR_EditWeapon * 2 + 1]--; }\n        }\n    }\n\n    if (event_press(UP_BTN)) { rect_y -= 16; }\n    if (event_press(DOWN_BTN)) { rect_y += 16; }\n\n    if (AntiRecoilTimeline_SubPage == 0) {\n        if (rect_y < 12) { rect_y = 12; }\n        if (rect_y > 44) {\n            AntiRecoilTimeline_SubPage = 1;\n            rect_y = 12;\n        }\n    } else {\n        if (rect_y < 12) {\n            AntiRecoilTimeline_SubPage = 0;\n            rect_y = 44;\n        }\n        if (rect_y > 12) { rect_y = 12; }\n    }\n\n    if (Weapons_RecoilValues[AR_EditWeapon * 2] < -100) { Weapons_RecoilValues[AR_EditWeapon * 2] = -100; }\n    if (Weapons_RecoilValues[AR_EditWeapon * 2] > 100) { Weapons_RecoilValues[AR_EditWeapon * 2] = 100; }\n    if (Weapons_RecoilValues[AR_EditWeapon * 2 + 1] < -100) { Weapons_RecoilValues[AR_EditWeapon * 2 + 1] = -100; }\n    if (Weapons_RecoilValues[AR_EditWeapon * 2 + 1] > 100) { Weapons_RecoilValues[AR_EditWeapon * 2 + 1] = 100; }\n\n    if (event_press(CANCEL_BTN)) {\n        if (AntiRecoilTimeline_SubPage > 0) {\n            AntiRecoilTimeline_SubPage = 0;\n            rect_y = 12;\n        } else {\n            Menu = 1;\n            rect_y = 12;\n            AntiRecoilTimeline_SubPage = 0;\n            _CoreSave();\n        }\n    }\n}"
options = [
    { name = "Status", var = "AntiRecoilStatus", type = "toggle", default = 0 },
]

[antirecoil_timeline.config_menu]
name = "Anti Recoil (Timeline)"
type = "clickable"
render_function = "AntiRecoilTimeline_RenderSubmenu"

[antirecoil_timeline.extra_vars]
AntiRecoil_Timer = "int"
Recoil_Vertical = "int"
Recoil_Horizontal = "int"
active_weapon = "int"
AR_EditWeapon = "int"
_recoil_phase_v = "int [10]"
_recoil_phase_h = "int [10]"
_last_recoil_weapon = "int = -1"
_current_phase = "int"
_ar_i = "int"
AntiRecoilTimeline_SubPage = "int"
