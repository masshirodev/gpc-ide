[antirecoil]
display_name = "Anti Recoil (Basic)"
id = "antirecoil"
type = "fps"
input_device = "controller"
description = "Per-weapon anti-recoil compensation while firing.\nApplies randomized variance to vertical and horizontal correction for natural feel.\nUses per-weapon V/H values from weapon data."
state_display = "AR"
status_var = "AntiRecoilStatus"
needs_weapondata = true
conflicts = [
    "antirecoil_decay",
    "antirecoil_timeline",
]
trigger = "// Sync V/H proxy vars with per-weapon array\n_ar_cur_weapon = GetActiveWeapon();\nif (_ar_cur_weapon != _ar_prev_weapon) {\n    Weapons_RecoilValues[_ar_prev_weapon * 2] = AR_Vertical;\n    Weapons_RecoilValues[_ar_prev_weapon * 2 + 1] = AR_Horizontal;\n    AR_Vertical = Weapons_RecoilValues[_ar_cur_weapon * 2];\n    AR_Horizontal = Weapons_RecoilValues[_ar_cur_weapon * 2 + 1];\n    _ar_prev_weapon = _ar_cur_weapon;\n}\nWeapons_RecoilValues[_ar_cur_weapon * 2] = AR_Vertical;\nWeapons_RecoilValues[_ar_cur_weapon * 2 + 1] = AR_Horizontal;\n\nif (AntiRecoilStatus && get_val(PS5_L2) && get_val(PS5_R2)) {\n    AntiRecoil_Timer++;\n    if (AntiRecoil_Timer >= ANTIRECOIL_INIT_DELAY) {\n        combo_run(AntiRecoil);\n    }\n} else {\n    AntiRecoil_Timer = 0;\n}"
combo = "define ANTIRECOIL_INIT_DELAY = 15;  // Skip first ~150ms of firing (minimal recoil)\n\ncombo AntiRecoil {\n    active_weapon = GetActiveWeapon();\n\n    // Per-weapon recoil values\n    Recoil_Vertical = Weapons_RecoilValues[active_weapon * 2];\n    Recoil_Horizontal = Weapons_RecoilValues[active_weapon * 2 + 1];\n\n    // Advance LCG seed every cycle for well-distributed variance\n    _jitter_seed = (_jitter_seed * 1103515245 + 12345) ^ get_rtime();\n\n    // Per-cycle variance: ±15% of base value, V and H derived independently\n    random_variance_v = (abs(_jitter_seed) % 31) - 15;\n    random_variance_h = (abs(_jitter_seed / 31) % 23) - 11;\n\n    if (Recoil_Vertical != 0) {\n        set_val(PS5_RY, clamp(get_val(PS5_RY) + Recoil_Vertical + (random_variance_v * abs(Recoil_Vertical) / 100), -100, 100));\n    }\n    if (Recoil_Horizontal != 0) {\n        set_val(PS5_RX, clamp(get_val(PS5_RX) + Recoil_Horizontal + (random_variance_h * abs(Recoil_Horizontal) / 100), -100, 100));\n    }\n}"
options = [
    { name = "Status", var = "AntiRecoilStatus", type = "toggle", default = 0 },
    { name = "Vertical", var = "AR_Vertical", type = "value", default = 0, min = -100, max = 100 },
    { name = "Horizontal", var = "AR_Horizontal", type = "value", default = 0, min = -100, max = 100 },
]

[antirecoil.extra_vars]
random_variance_v = "int"
random_variance_h = "int"
AntiRecoil_Timer = "int"
Recoil_Vertical = "int"
Recoil_Horizontal = "int"
active_weapon = "int"
_ar_cur_weapon = "int"
_ar_prev_weapon = "int"
