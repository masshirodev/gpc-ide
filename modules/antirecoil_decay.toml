[antirecoil_decay]
display_name = "Anti Recoil (Decay)"
id = "antirecoil_decay"
type = "fps"
input_device = "controller"
description = "Per-weapon anti-recoil with gradual decay on sustained fire.\nAfter a configurable delay, recoil compensation gradually reduces to a floor value.\nUses per-weapon V/H values from weapon data."
state_display = "AR"
status_var = "AntiRecoilStatus"
needs_weapondata = true
conflicts = [
    "antirecoil",
    "antirecoil_timeline",
]
trigger = "// Sync V/H proxy vars with per-weapon array\n_ar_cur_weapon = GetActiveWeapon();\nif (_ar_cur_weapon != _ar_prev_weapon) {\n    Weapons_RecoilValues[_ar_prev_weapon * 2] = AR_Vertical;\n    Weapons_RecoilValues[_ar_prev_weapon * 2 + 1] = AR_Horizontal;\n    AR_Vertical = Weapons_RecoilValues[_ar_cur_weapon * 2];\n    AR_Horizontal = Weapons_RecoilValues[_ar_cur_weapon * 2 + 1];\n    _ar_prev_weapon = _ar_cur_weapon;\n}\nWeapons_RecoilValues[_ar_cur_weapon * 2] = AR_Vertical;\nWeapons_RecoilValues[_ar_cur_weapon * 2 + 1] = AR_Horizontal;\n\nif (AntiRecoilStatus && get_val(PS5_L2) && get_val(PS5_R2)) {\n    AntiRecoil_Timer++;\n    if (AntiRecoil_Timer >= ANTIRECOIL_INIT_DELAY) {\n        combo_run(AntiRecoilDecay);\n    }\n} else {\n    AntiRecoil_Timer = 0;\n    AR_DecayCycles = 0;\n}"
combo = "define ANTIRECOIL_INIT_DELAY = 15;  // Skip first ~150ms of firing (minimal recoil)\n\ncombo AntiRecoilDecay {\n    active_weapon = GetActiveWeapon();\n\n    // Base recoil values from weapon data\n    Recoil_Vertical = Weapons_RecoilValues[active_weapon * 2];\n    Recoil_Horizontal = Weapons_RecoilValues[active_weapon * 2 + 1];\n\n    // Apply decay after sustained fire\n    AR_DecayCycles++;\n    if (AR_DecayCycles > AR_DecayStart) {\n        AR_DecayMult = 100 - ((AR_DecayCycles - AR_DecayStart) * AR_DecayRate);\n        if (AR_DecayMult < AR_DecayFloor) { AR_DecayMult = AR_DecayFloor; }\n        Recoil_Vertical = (Recoil_Vertical * AR_DecayMult) / 100;\n        Recoil_Horizontal = (Recoil_Horizontal * AR_DecayMult) / 100;\n    }\n\n    // Advance LCG seed every cycle for well-distributed variance\n    _jitter_seed = (_jitter_seed * 1103515245 + 12345) ^ get_rtime();\n\n    // Per-cycle variance: ±15% of base value, V and H derived independently\n    random_variance_v = (abs(_jitter_seed) % 31) - 15;\n    random_variance_h = (abs(_jitter_seed / 31) % 23) - 11;\n\n    // Apply recoil correction with randomness\n    if (Recoil_Vertical != 0) {\n        set_val(PS5_RY, clamp(get_val(PS5_RY) + Recoil_Vertical + (random_variance_v * abs(Recoil_Vertical) / 100), -100, 100));\n    }\n    if (Recoil_Horizontal != 0) {\n        set_val(PS5_RX, clamp(get_val(PS5_RX) + Recoil_Horizontal + (random_variance_h * abs(Recoil_Horizontal) / 100), -100, 100));\n    }\n}"

[[antirecoil_decay.options]]
name = "Status"
var = "AntiRecoilStatus"
type = "toggle"
default = 0

[[antirecoil_decay.options]]
name = "Vertical"
var = "AR_Vertical"
type = "value"
default = 0
min = -100
max = 100

[[antirecoil_decay.options]]
name = "Horizontal"
var = "AR_Horizontal"
type = "value"
default = 0
min = -100
max = 100

[[antirecoil_decay.options]]
name = "Decay Start"
var = "AR_DecayStart"
type = "value"
default = 80
min = 10
max = 300

[[antirecoil_decay.options]]
name = "Decay Rate"
var = "AR_DecayRate"
type = "value"
default = 3
min = 1
max = 10

[[antirecoil_decay.options]]
name = "Decay Floor"
var = "AR_DecayFloor"
type = "value"
default = 20
min = 10
max = 100

[antirecoil_decay.extra_vars]
random_variance_v = "int"
random_variance_h = "int"
AntiRecoil_Timer = "int"
Recoil_Vertical = "int"
Recoil_Horizontal = "int"
active_weapon = "int"
_ar_cur_weapon = "int"
_ar_prev_weapon = "int"
AR_DecayCycles = "int"
AR_DecayMult = "int"
